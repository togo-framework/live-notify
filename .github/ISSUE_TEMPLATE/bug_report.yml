name: Bug report
description: Report a problem with the togo live-notify plugin
labels: [bug]
body:
  - type: textarea
    id: what
    attributes: { label: What happened?, description: A clear description + steps (which channel, which notifications driver). }
    validations: { required: true }
  - type: input
    id: version
    attributes: { label: live-notify / live / togo version }
  - type: textarea
    id: env
    attributes: { label: Environment, description: OS, Go version, notifications channel drivers installed. }
